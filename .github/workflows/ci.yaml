name: CI
# Lint, type-check and test on every push / PR. Build image on main.
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --group dev
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest
