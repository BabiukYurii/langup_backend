name: CI
# Lint, type-check and test on every push / PR.
on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    # The test suite uses its own in-memory sqlite (sessions are overridden),
    # but importing settings requires DATABASE_URL — provide a dummy one in CI.
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      # mypy is advisory while the skeleton's stub modules are being implemented.
      - run: uv run mypy app
        continue-on-error: true
      - run: uv run pytest
